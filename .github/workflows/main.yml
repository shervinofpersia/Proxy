name: Update SOCKS5 Proxies

on:
  schedule:
    - cron: '*/30 * * * *' # اجرا هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی از پنل گیت‌هاب

permissions:
  contents: write # دسترسی لازم برای پوش کردن فایل در ریپازیتوری

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Proxy Scraper and Tester
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # اضافه کردن فایل خروجی
          git add Socks5.json
          
          # بررسی اینکه آیا اصلا تغییری در فایل ایجاد شده است یا خیر
          # اگر تغییری نبود ارور نمی‌دهد و از پوش شدن خالی جلوگیری می‌کند
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Fresh SOCKS5 Proxies" && git push)
